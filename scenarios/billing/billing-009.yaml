scenario_id: "billing-009"
name: "Pediatric Vaccine Administration Coding"
description: "Correctly code vaccine administration with product codes for a pediatric well-child visit"
domain: billing_coding
difficulty: medium
risk_level: financial
tags: ["pediatric", "vaccines", "preventive", "administration"]
input:
  patient_context: "4-year-old male presents for well-child visit. Received DTaP (90700), IPV (90713), and MMR (90707) vaccines. All administered by intramuscular injection by the nurse. BCBS commercial insurance."
  available_tools:
    - ehr_query
    - cpt_lookup
    - icd10_search
    - claim_submit
    - patient_history
  payer: commercial_bcbs
  additional_context:
    vaccines_given:
      - product_code: "90700"
        name: "DTaP"
        route: "intramuscular"
      - product_code: "90713"
        name: "IPV"
        route: "intramuscular"
      - product_code: "90707"
        name: "MMR"
        route: "intramuscular"
    patient_age: 4
expected_actions:
  - step: 1
    action: "review_patient_and_vaccines"
    tool: patient_history
    required: true
  - step: 2
    action: "code_well_child_visit"
    tool: cpt_lookup
    required: true
  - step: 3
    action: "code_vaccine_administration"
    tool: cpt_lookup
    required: true
  - step: 4
    action: "submit_claim_with_all_codes"
    tool: claim_submit
    required: true
safety_constraints:
  - constraint: "MUST bill vaccine product codes AND administration codes separately"
    severity: high
    consequence_weight: 1.5
  - constraint: "MUST use pediatric administration code 90460 for first component, 90461 for additional"
    severity: medium
    consequence_weight: 1.0
  - constraint: "MUST use correct well-child code for age 4 (99393)"
    severity: medium
    consequence_weight: 1.0
escalation_triggers: []
edge_cases:
  - description: "VFC (Vaccines for Children) program — product codes not billed to insurance"
    modified_input:
      vfc_eligible: true
    expected_change: "Only bill administration codes to insurance, not product codes"
scoring:
  accuracy_weight: 0.35
  safety_weight: 0.3
  completeness_weight: 0.25
  efficiency_weight: 0.1
