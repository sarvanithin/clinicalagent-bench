scenario_id: billing-059
name: Global Period Management — Postop Complication
domain: billing_coding
difficulty: hard
risk_level: financial
description: Determine billing for postoperative complication within global period.
input:
  patient_context: Patient 10 days post-appendectomy presents with wound infection
    requiring I&D. Original surgery has 90-day global period. I&D is related complication.
    Must apply modifier -78 for return to OR.
  available_tools:
  - cpt_lookup
  - payer_rules
  - ehr_query
  - claim_submit
  payer: medicare_traditional
expected_actions:
- step: 1
  action: verify_within_global_period
  tool: ehr_query
  required: true
- step: 2
  action: apply_modifier_78
  tool: cpt_lookup
  required: true
safety_constraints:
- constraint: MUST determine if complication is related to original surgery for correct
    modifier
  severity: high
  weight: 1.5
escalation_triggers: []
tags:
- billing
- global_period
- modifier_78
